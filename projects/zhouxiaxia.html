<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>周大侠 — 作品</title>
    <link rel="stylesheet" href="../css/figma.css" />
    <link rel="stylesheet" href="../css/project-detail.css" />
  </head>
  <body>
    <a class="figma-skip" href="#main">跳到主要内容</a>
    <div class="figma-page figma-page--detail" id="top">
      <header class="figma-header">
        <a class="figma-logo" href="../index.html#top" aria-label="返回首页">
          <img src="../assets/figma/logo-header.png" alt="" width="120" height="27" />
        </a>
        <button
          type="button"
          class="figma-nav-toggle"
          id="figma-nav-toggle"
          aria-expanded="false"
          aria-controls="figma-nav-overlay"
          aria-label="打开菜单"
        >
          <span class="figma-nav-toggle-box" aria-hidden="true">
            <span class="figma-nav-toggle-bar"></span>
            <span class="figma-nav-toggle-bar"></span>
            <span class="figma-nav-toggle-bar"></span>
          </span>
        </button>
        <div class="figma-nav-cluster">
          <nav class="figma-nav-pill" aria-label="主导航">
            <a class="figma-nav-link" href="../index.html#top">Home</a>
            <a class="figma-nav-link figma-nav-link--active" href="../index.html#portfolio-masonry">Works</a>
            <a class="figma-nav-link" href="../index.html#what-we-provide">about</a>
          </nav>
          <a class="figma-book" href="../index.html#contact-footer">Contact me</a>
        </div>
      </header>
      <div
        id="figma-nav-overlay"
        class="figma-nav-overlay"
        hidden
        aria-hidden="true"
      >
        <div class="figma-nav-overlay-backdrop" data-figma-nav-close tabindex="-1"></div>
        <div class="figma-nav-sheet" role="dialog" aria-modal="true" aria-label="主导航菜单">
          <nav class="figma-nav-sheet-nav" aria-label="主导航">
            <a class="figma-nav-link figma-nav-sheet-link" href="../index.html#top">Home</a>
            <a class="figma-nav-link figma-nav-sheet-link" href="../index.html#portfolio-masonry">Works</a>
            <a class="figma-nav-link figma-nav-sheet-link" href="../index.html#what-we-provide">about</a>
          </nav>
          <a class="figma-book figma-book--sheet" href="../index.html#contact-footer">Contact me</a>
        </div>
      </div>

      <main id="main" class="project-detail">
        <a class="project-detail-back" href="../index.html#portfolio-masonry">← 返回作品列表</a>
        <h1>周大侠</h1>
        <p class="project-detail-lead">周大侠主题视觉与延展</p>
        <div class="figma-tags">
          <span class="figma-tag-outline">Illustration</span>
          <span class="figma-tag-fill">Campaign</span>
        </div>
        <div class="project-detail-gallery">
          <img src="../assets/projects/周大侠/60.jpg" alt="" loading="eager" decoding="async" />
          <img src="../assets/projects/周大侠/61.jpg" alt="" loading="lazy" decoding="async" />
          <img src="../assets/projects/周大侠/62.jpg" alt="" loading="lazy" decoding="async" />
          <img src="../assets/projects/周大侠/63.jpg" alt="" loading="lazy" decoding="async" />
          <img src="../assets/projects/周大侠/64.jpg" alt="" loading="lazy" decoding="async" />
          <img src="../assets/projects/周大侠/65.jpg" alt="" loading="lazy" decoding="async" />
        </div>
      </main>
    </div>
    <script src="../js/figma-nav.js" defer></script>
  </body>
</html>
